<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🌱 Smart Farming</h1>
        <nav>
            <ul>
                <li><a href="index.html">Mwanzo</a></li>
                <li><a href="kuhusu.html">Kuhusu Sisi</a></li>
                <li><a href="huduma.html">Huduma</a></li>
                <li><a href="dashibodi.html">Dashibodi</a></li>

                <li><a href="ingia.html" class="btn" style="padding: 5px 15px; margin-top:-5px;">Ingia</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="form-container">
            <h2 style="color: var(--primary-color); text-align: center; margin-bottom: 20px;">Wasiliana Nasi</h2>
            <p style="text-align: center; margin-bottom: 20px;">Tutumie ujumbe kama una swali au unahitaji msaada kuhusu mfumo wetu.</p>
            
            <form action="#" method="get">
                <div class="form-group">
                    <label for="jina">Jina Lako:</label>
                    <input type="text" id="jina" name="jina" placeholder="Weka jina lako hapa" required>
                </div>
                
                <div class="form-group">
                    <label for="namba">Namba ya Simu:</label>
                    <input type="tel" id="namba" name="namba" placeholder="Mfano: 0700 000 000" required>
                </div>
                
                <div class="form-group">
                    <label for="ujumbe">Ujumbe Wako:</label>
                    <textarea id="ujumbe" name="ujumbe" placeholder="Andika ujumbe wako hapa..." required></textarea>
                </div>
                
                <button type="submit" class="btn" style="width: 100%;">Tuma Ujumbe</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Smart Farming System. Haki zote zimehifadhiwa.</p>
    </footer>

</body>

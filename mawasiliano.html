<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Farming | Mawasiliano</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🌱 Smart Farming</h1>
        <nav>
            <ul>
                <li><a href="index.html">Mwanzo</a></li>
                <li><a href="kuhusu.html">Kuhusu Sisi</a></li>
                <li><a href="huduma.html">Huduma</a></li>
                <li><a href="dashibodi.html">Dashibodi</a></li>
                <li><a href="mawasiliano.html">Mawasiliano</a></li>
                <li><a href="ingia.html" class="btn">Ingia</a></li>
            </ul>
        </nav>
    </header>

    <main style="display: flex; align-items: center; justify-content: center; min-height: 70vh;">
        <div class="form-container">
            <h2>Wasiliana Nasi</h2>
            <p style="text-align: center; margin-bottom: 20px; color: var(--text-muted);">Tutumie ujumbe kwa swali au ushauri wowote kuhusu huduma zetu.</p>
            
            <form action="#" method="post">
                <div class="form-group">
                    <label for="jina">Jina Lako:</label>
                    <input type="text" id="jina" name="jina" placeholder="Andika jina lako" required>
                </div>
                
                <div class="form-group">
                    <label for="barua">Barua Pepe:</label>
                    <input type="email" id="barua" name="barua" placeholder="mfano@barua.com" required>
                </div>

                <div class="form-group">
                    <label for="ujumbe">Ujumbe Wako:</label>
                    <textarea id="ujumbe" name="ujumbe" placeholder="Andika ujumbe wako hapa..." required></textarea>
                </div>
                
                <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Tuma Ujumbe</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Smart Farming System. Haki zote zimehifadhiwa.</p>
    </footer>

</body>
</html>

            <h2 style="color: var(--primary-color); text-align: center; margin-bottom: 20px;">Ingia Kwenye Mfumo</h2>

                <div class="form-group">
                    <label for="barua">Barua Pepe (Email):</label>
                    <input type="email" id="barua" name="barua" placeholder="mkulima@mfano.com" required>

                    <label for="nywila">Nywila (Password):</label>
                    <input type="password" id="nywila" name="nywila" placeholder="Weka nywila yako" required>

                <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Ingia</button>
                
                <p style="text-align: center; margin-top: 15px; font-size: 14px;">
                    Umesahau Nywila? <a href="#" style="color: var(--primary-color);">Bofya hapa</a>
                </p>

        </div>
